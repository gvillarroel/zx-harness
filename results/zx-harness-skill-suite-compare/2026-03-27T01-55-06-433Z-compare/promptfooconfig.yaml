tests:
  - description: codex mini | Evaluate whether the skill suite improves repository
      structure and boundary recommendations.
    vars:
      taskPrompt: >
        Read the repository and propose a practical architecture for a zx-based
        script harness that can coordinate bash, pi-mono, and
        @github/copilot-sdk. Return exactly four sections titled Goals, Folder
        Structure, Runtime Boundaries, and Risks. In Folder Structure, mention
        skills/, packages/runtime/, and packages/adapters/.
      variantId: codex-mini
      variantDisplayName: codex mini
    metadata:
      benchmarkId: zx-harness-skill-suite-compare
      promptId: architecture-layout
      promptDescription: Evaluate whether the skill suite improves repository
        structure and boundary recommendations.
      variantId: codex-mini
      variantDisplayName: codex mini
      rowId: codex-mini:architecture-layout
      label_variantId: codex-mini
      label_variantDisplayName: codex mini
    assert:
      - type: llm-rubric
        value: Score 1.0 only if the answer is grounded in the repository, correctly
          distinguishes zx, bash, pi-mono, and @github/copilot-sdk, and gives
          concrete recommendations that are immediately useful for
          implementation planning.
        provider:
          id: C:\Users\villa\dev\skill-arena\src\providers\local-judge-provider.js
          config:
            provider_id: skill-arena:judge:codex
            adapter: codex
            working_directory: C:\Users\villa\AppData\Local\Temp\skill-arena-execution-DC6UEW\workspace
      - type: regex
        value: (?s)Goals.*Folder Structure.*Runtime Boundaries.*Risks
      - type: regex
        value: (?i)skills/
      - type: regex
        value: (?i)packages/runtime/
      - type: regex
        value: (?i)packages/adapters/
  - description: codex mini | Evaluate whether the skill suite improves
      stage-contract design across runtimes.
    vars:
      taskPrompt: >
        Define a normalized execution contract for a zx harness that runs stages
        through bash, pi-mono, and @github/copilot-sdk. Include a TypeScript
        type named StageResult and explain which runtime-specific metadata
        should be preserved for each of the three runtimes.
      variantId: codex-mini
      variantDisplayName: codex mini
    metadata:
      benchmarkId: zx-harness-skill-suite-compare
      promptId: stage-contract
      promptDescription: Evaluate whether the skill suite improves stage-contract
        design across runtimes.
      variantId: codex-mini
      variantDisplayName: codex mini
      rowId: codex-mini:stage-contract
      label_variantId: codex-mini
      label_variantDisplayName: codex mini
    assert:
      - type: llm-rubric
        value: Score 1.0 only if the answer is grounded in the repository, correctly
          distinguishes zx, bash, pi-mono, and @github/copilot-sdk, and gives
          concrete recommendations that are immediately useful for
          implementation planning.
        provider:
          id: C:\Users\villa\dev\skill-arena\src\providers\local-judge-provider.js
          config:
            provider_id: skill-arena:judge:codex
            adapter: codex
            working_directory: C:\Users\villa\AppData\Local\Temp\skill-arena-execution-DC6UEW\workspace
      - type: contains
        value: StageResult
      - type: regex
        value: (?i)\bbash\b
      - type: regex
        value: (?i)\bpi(-mono)?\b
      - type: regex
        value: (?i)copilot

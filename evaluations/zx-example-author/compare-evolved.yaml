schemaVersion: 1
benchmark:
  id: zx-example-author-compare
  description: Compare Codex variants on short zx-harness example prompts with the baseline zx-example-author skill and two evolved alternatives.
  tags:
    - compare
    - zx
    - harness
    - skill
    - examples
task:
  prompts:
    - id: hello-name
      description: Create the hello-name example from a short prompt.
      prompt: >-
        Create a small zx example in `hello-name/index.mjs` that takes a name
        from the CLI when present, otherwise prompts for it, prints
        `hello <name>`, and returns only a brief completion note after the file
        is written.
      evaluation:
        assertions:
          - type: file-contains
            path: hello-name/index.mjs
            value: "#!/usr/bin/env zx"
          - type: file-contains
            path: hello-name/index.mjs
            value: "question("
          - type: file-contains
            path: hello-name/index.mjs
            value: "hello ${"
          - type: file-contains
            path: hello-name/index.mjs
            value: "process.argv"
          - type: file-contains
            path: hello-name/index.mjs
            value: "trim("
          - type: file-contains
            path: hello-name/index.mjs
            value: "Error"
    - id: hello-cop
      description: Create the hello-cop example from a short prompt.
      prompt: >-
        Create a small zx example in `hello-cop/index.mjs` that runs one tiny
        Copilot CLI prompt with zx and returns only a brief completion note
        after the file is written.
      evaluation:
        assertions:
          - type: file-contains
            path: hello-cop/index.mjs
            value: "#!/usr/bin/env zx"
          - type: file-contains
            path: hello-cop/index.mjs
            value: "$.quote = quote;"
          - type: file-contains
            path: hello-cop/index.mjs
            value: "copilot -p 'ping' --model gpt-5-mini"
    - id: gh-involved-repos
      description: Create the gh-involved-repos example from a short prompt.
      prompt: >-
        Create a small example folder named `gh-involved-repos` with
        `index.mjs` and `repo.ts` that lists repos the current GitHub user is
        involved in, prints one `name: owner/repo` per line, and returns only a
        brief completion note after the files are written.
      evaluation:
        assertions:
          - type: file-contains
            path: gh-involved-repos/index.mjs
            value: "import { printRepo } from \"./repo.ts\";"
          - type: file-contains
            path: gh-involved-repos/index.mjs
            value: "gh api user --jq .login"
          - type: file-contains
            path: gh-involved-repos/index.mjs
            value: "--limit 1000 --json repository"
          - type: file-contains
            path: gh-involved-repos/index.mjs
            value: "printRepo(repo);"
          - type: file-contains
            path: gh-involved-repos/repo.ts
            value: "console.log(`name: ${name}`);"
    - id: copilot-sdk-repo-summary
      description: Create the Copilot SDK repo summary example from a short prompt.
      prompt: >-
        Create a folder named `copilot-sdk-repo-summary` with `index.mjs`,
        `summarize-repo.ts`, `package.json`, `tsconfig.json`, and a short
        README. The zx entrypoint should verify `node`, `npm`, and `git`,
        require local dependencies to be installed, and then run
        `npm exec -- tsx summarize-repo.ts`. The TypeScript script should
        accept a local repo path or GitHub tree URL, summarize the repository by
        mapping files, summarizing files in pairs with the Copilot SDK, merging
        summaries in pairs, and writing the final markdown summary plus map and
        tree JSON files under `run/`. Return only a brief completion note after
        the files are written.
      evaluation:
        assertions:
          - type: file-contains
            path: copilot-sdk-repo-summary/index.mjs
            value: "#!/usr/bin/env zx"
          - type: file-contains
            path: copilot-sdk-repo-summary/index.mjs
            value: "$.quote = quote;"
          - type: file-contains
            path: copilot-sdk-repo-summary/index.mjs
            value: "for (const command of [\"node\", \"npm\", \"git\"])"
          - type: file-contains
            path: copilot-sdk-repo-summary/index.mjs
            value: "npm exec -- tsx summarize-repo.ts"
          - type: file-contains
            path: copilot-sdk-repo-summary/summarize-repo.ts
            value: "CopilotClient"
          - type: file-contains
            path: copilot-sdk-repo-summary/summarize-repo.ts
            value: "approveAll"
          - type: file-contains
            path: copilot-sdk-repo-summary/summarize-repo.ts
            value: "mapped_files:"
          - type: file-contains
            path: copilot-sdk-repo-summary/summarize-repo.ts
            value: "merge_level:"
          - type: file-contains
            path: copilot-sdk-repo-summary/package.json
            value: "\"@github/copilot-sdk\""
          - type: file-contains
            path: copilot-sdk-repo-summary/tsconfig.json
            value: "\"module\": \"NodeNext\""
    - id: pi-mono-repo-summary
      description: Create the pi-mono SDK repo summary example from a short prompt.
      prompt: >-
        Create a folder named `pi-mono-repo-summary` with `index.mjs`,
        `summarize-repo.ts`, `package.json`, `tsconfig.json`, and a short
        README. The zx entrypoint should verify `node`, `npm`, and `git`,
        require local dependencies to be installed, and then run
        `npm exec -- tsx summarize-repo.ts`. The TypeScript script should
        accept a local repo path or GitHub tree URL, choose provider and model
        from environment variables when present, summarize the repository by
        mapping files, summarizing files in pairs with pi-mono, merging
        summaries in pairs, and writing the final markdown summary plus map and
        tree JSON files under `run/`. Return only a brief completion note after
        the files are written.
      evaluation:
        assertions:
          - type: file-contains
            path: pi-mono-repo-summary/index.mjs
            value: "#!/usr/bin/env zx"
          - type: file-contains
            path: pi-mono-repo-summary/index.mjs
            value: "$.quote = quote;"
          - type: file-contains
            path: pi-mono-repo-summary/index.mjs
            value: "for (const command of [\"node\", \"npm\", \"git\"])"
          - type: file-contains
            path: pi-mono-repo-summary/index.mjs
            value: "npm exec -- tsx summarize-repo.ts"
          - type: file-contains
            path: pi-mono-repo-summary/summarize-repo.ts
            value: "completeSimple"
          - type: file-contains
            path: pi-mono-repo-summary/summarize-repo.ts
            value: "getModel"
          - type: file-contains
            path: pi-mono-repo-summary/summarize-repo.ts
            value: "getOAuthApiKey"
          - type: file-contains
            path: pi-mono-repo-summary/summarize-repo.ts
            value: "PI_MONO_REPO_SUMMARY_PROVIDER"
          - type: file-contains
            path: pi-mono-repo-summary/summarize-repo.ts
            value: "mapped_files:"
          - type: file-contains
            path: pi-mono-repo-summary/package.json
            value: "\"@mariozechner/pi-ai\""
workspace:
  sources:
    - id: base
      type: local-path
      path: C:/Users/villa/dev/zx-harness/evaluations/zx-example-author/fixtures/base
      target: /
  setup:
    initializeGit: true
evaluation:
  assertions:
    - type: javascript
      value: 'typeof output === "string" && output.trim().length > 0'
  requests: 1
  timeoutMs: 600000
  tracing: false
  maxConcurrency: 1
  noCache: true
comparison:
  profiles:
    - id: no-skill
      description: Fully isolated baseline without the zx-example-author skill.
      isolation:
        inheritSystem: false
      capabilities: {}
      output:
        tags:
          - baseline
        labels:
          skill_state: off
    - id: skill
      description: Workspace overlay with the local zx-example-author skill enabled.
      isolation:
        inheritSystem: false
      capabilities:
        skills:
          - source:
              type: local-path
              path: C:/Users/villa/dev/zx-harness/skills/zx-example-author
              skillId: zx-example-author
            install:
              strategy: workspace-overlay
      output:
        tags:
          - skill
        labels:
          skill_state: on
    - id: skill-evolution
      description: Workspace overlay with the scaffold-first evolved zx-example-author skill.
      isolation:
        inheritSystem: false
      capabilities:
        skills:
          - source:
              type: local-path
              path: C:/Users/villa/dev/zx-harness/evaluations/zx-example-author/evolved-skills/skill-evolution-zx-example-author
              skillId: zx-example-author
            install:
              strategy: workspace-overlay
      output:
        tags:
          - skill
          - evolved
          - scaffold-first
        labels:
          skill_state: evolution
    - id: skill-traced-evolution
      description: Workspace overlay with the trace-informed evolved zx-example-author skill.
      isolation:
        inheritSystem: false
      capabilities:
        skills:
          - source:
              type: local-path
              path: C:/Users/villa/dev/zx-harness/evaluations/zx-example-author/evolved-skills/skill-traced-evolution-zx-example-author
              skillId: zx-example-author
            install:
              strategy: workspace-overlay
      output:
        tags:
          - skill
          - evolved
          - traced
        labels:
          skill_state: traced-evolution
  variants:
    - id: codex-mini
      description: Codex mini authoring variant.
      agent:
        adapter: codex
        model: gpt-5.1-codex-mini
        executionMethod: command
        commandPath: codex
        sandboxMode: danger-full-access
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: true
        reasoningEffort: low
        additionalDirectories: []
        cliEnv: {}
        config: {}
      output:
        tags:
          - codex
          - mini
        labels:
          variantDisplayName: codex mini
    - id: gpt-5-4
      description: GPT-5.4 authoring variant.
      agent:
        adapter: codex
        model: gpt-5.4
        executionMethod: command
        commandPath: codex
        sandboxMode: danger-full-access
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: true
        reasoningEffort: low
        additionalDirectories: []
        cliEnv: {}
        config: {}
      output:
        tags:
          - gpt
          - "5.4"
        labels:
          variantDisplayName: GPT-5.4
